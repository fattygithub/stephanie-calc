name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    name: Lint with ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Unit Tests (matrix) ──────────────────────────────
  test:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: node --experimental-vm-modules node_modules/jest-cli/bin/jest.js --passWithNoTests

  # ── Job 3: Security Audit ────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high

  # ── Job 4: Docker Build & Push ───────────────────────────────
  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [test, audit]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stephanie-calc:latest

  # ── Job 5: Deploy via FTPS ───────────────────────────────────
  deploy:
    name: Deploy via FTPS to VPS
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy static files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/__tests__/**
            **/Dockerfile
            **/.github/**

  # ── Job 6: Verify Deployment ────────────────────────────────
  verify:
    name: Verify Live Deployment
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to settle
        run: sleep 15

      - name: Check live URL returns HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ vars.LIVE_URL }})
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deployment verification failed — expected 200, got $STATUS"
            exit 1
          fi
          echo "Deployment verified successfully!"
